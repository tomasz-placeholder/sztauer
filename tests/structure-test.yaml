schemaVersion: "2.0.0"

commandTests:
  - name: "claude CLI installed"
    command: "claude"
    args: ["--version"]
    exitCode: 0

  - name: "code-server installed"
    command: "code-server"
    args: ["--version"]
    exitCode: 0

  - name: "ttyd installed"
    command: "ttyd"
    args: ["--version"]
    exitCode: 0

  - name: "caddy installed"
    command: "caddy"
    args: ["version"]
    exitCode: 0

  - name: "node installed"
    command: "node"
    args: ["--version"]
    expectedOutput: ["v22\\."]
    exitCode: 0

  - name: "python3 installed"
    command: "python3"
    args: ["--version"]
    expectedOutput: ["Python 3"]
    exitCode: 0

  - name: "git installed"
    command: "git"
    args: ["--version"]
    expectedOutput: ["git version"]
    exitCode: 0

  - name: "ripgrep installed"
    command: "rg"
    args: ["--version"]
    exitCode: 0

  - name: "jq installed"
    command: "jq"
    args: ["--version"]
    exitCode: 0

  - name: "coder user exists"
    command: "id"
    args: ["coder"]
    expectedOutput: ["uid=1000"]
    exitCode: 0

fileExistenceTests:
  - name: "entrypoint exists and is executable"
    path: "/opt/sztauer/entrypoint.sh"
    shouldExist: true
    permissions: "-rwxr-xr-x"

  - name: "firewall lib exists"
    path: "/opt/sztauer/lib/firewall.sh"
    shouldExist: true

  - name: "workspace lib exists"
    path: "/opt/sztauer/lib/workspace.sh"
    shouldExist: true

  - name: "allowlist exists"
    path: "/etc/sztauer/allowlist.txt"
    shouldExist: true

  - name: "Caddyfile exists"
    path: "/etc/caddy/Caddyfile"
    shouldExist: true

  - name: "code-server config exists"
    path: "/etc/sztauer/code-server.yaml"
    shouldExist: true

  - name: "workspace template CLAUDE.md exists"
    path: "/etc/sztauer/workspace-template/CLAUDE.md"
    shouldExist: true

  - name: "split screen HTML exists"
    path: "/opt/sztauer/web/index.html"
    shouldExist: true

  - name: "placeholder HTML exists"
    path: "/opt/sztauer/web/placeholder.html"
    shouldExist: true

metadataTest:
  exposedPorts: ["420"]
