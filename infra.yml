name: sztauer-infra

services:
  proxy:
    image: lucaslorentz/caddy-docker-proxy:2.9
    ports:
      - "80:80"
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
    networks:
      - proxy
    restart: always
    environment:
      - CADDY_INGRESS_NETWORKS=sztauer-proxy
    labels:
      sztauer: "true"
      sztauer.role: "proxy"

  port-router:
    image: node:20-slim
    volumes:
      - ./port-router.js:/app/port-router.js:ro
    command: ["node", "/app/port-router.js"]
    networks:
      - proxy
    restart: always
    labels:
      sztauer: "true"
      sztauer.role: "port-router"
      # Catch-all for dynamic port subdomains ({name}-{port}.localhost, {name}-app.localhost)
      # Specific editor routes (from workspace containers) take priority.
      caddy: "http://:80"
      caddy.reverse_proxy: "{{upstreams 9091}}"

networks:
  proxy:
    name: sztauer-proxy
