name: sztauer-${PROJECT_NAME}

services:
  workspace:
    image: sztauer/sandbox:latest
    container_name: sztauer-${PROJECT_NAME}-workspace
    environment:
      - ANTHROPIC_API_KEY=${ANTHROPIC_API_KEY}
      - PROJECT_NAME=${PROJECT_NAME}
      - APP_PORT=${APP_PORT:-8000}
      - FIREWALL_ALLOW=${FIREWALL_ALLOW:-}
    volumes:
      - ./projects/${PROJECT_NAME}:/workspace
      - vscode:/root/.local/share/code-server
      - claude:/root/.claude
      # Uncomment to enable git credentials:
      # - ~/.gitconfig:/root/.gitconfig:ro
      # - ~/.ssh:/root/.ssh:ro
    ports:
      - "8080"
    cap_add:
      - NET_ADMIN
    labels:
      - "sztauer=true"
      - "sztauer.project=${PROJECT_NAME}"
      # Caddy: editor subdomain ({name}.localhost → code-server)
      - "caddy=http://${PROJECT_NAME}.localhost"
      - "caddy.reverse_proxy={{upstreams 8080}}"
    networks:
      - proxy
      - default
    healthcheck:
      test: ["CMD", "curl", "-sf", "http://localhost:8080/healthz"]
      interval: 30s
      timeout: 5s
      start_period: 15s
      retries: 3

volumes:
  vscode:
    name: sztauer-${PROJECT_NAME}-vscode
  claude:
    name: sztauer-${PROJECT_NAME}-claude

networks:
  proxy:
    name: sztauer-proxy
    external: true
  default:
    name: sztauer-${PROJECT_NAME}-internal
