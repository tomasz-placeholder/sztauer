name: sztauer-${PROJECT_NAME}

services:
  workspace:
    image: sztauer/sandbox:latest
    container_name: sztauer-${PROJECT_NAME}-workspace
    environment:
      - ANTHROPIC_API_KEY=${ANTHROPIC_API_KEY}
      - PROJECT_NAME=${PROJECT_NAME}
      - APP_PORT=${APP_PORT:-8000}
      - FIREWALL_ALLOW=${FIREWALL_ALLOW:-}
    volumes:
      - ./projects/${PROJECT_NAME}:/workspace
      - sztauer-${PROJECT_NAME}-vscode:/root/.local/share/code-server
      - sztauer-${PROJECT_NAME}-claude:/root/.claude
      # Uncomment to enable git credentials:
      # - ~/.gitconfig:/root/.gitconfig:ro
      # - ~/.ssh:/root/.ssh:ro
    ports:
      - "8080"
    cap_add:
      - NET_ADMIN
    labels:
      sztauer: "true"
      sztauer.project: "${PROJECT_NAME}"
      # Traefik: editor subdomain
      traefik.enable: "true"
      traefik.http.routers.${PROJECT_NAME}-editor.rule: "Host(`${PROJECT_NAME}.localhost`)"
      traefik.http.routers.${PROJECT_NAME}-editor.service: "${PROJECT_NAME}-editor"
      traefik.http.services.${PROJECT_NAME}-editor.loadbalancer.server.port: "8080"
      # Traefik: app & dynamic port subdomains
      traefik.http.routers.${PROJECT_NAME}-ports.rule: "HostRegexp(`^${PROJECT_NAME}-[0-9]+\\.localhost$$`) || Host(`${PROJECT_NAME}-app.localhost`)"
      traefik.http.routers.${PROJECT_NAME}-ports.service: "${PROJECT_NAME}-ports"
      traefik.http.services.${PROJECT_NAME}-ports.loadbalancer.server.port: "9091"
    networks:
      - proxy
      - default
    healthcheck:
      test: ["CMD", "curl", "-sf", "http://localhost:8080/healthz"]
      interval: 30s
      timeout: 5s
      start_period: 15s
      retries: 3

volumes:
  sztauer-${PROJECT_NAME}-vscode:
    name: sztauer-${PROJECT_NAME}-vscode
  sztauer-${PROJECT_NAME}-claude:
    name: sztauer-${PROJECT_NAME}-claude

networks:
  proxy:
    name: sztauer-proxy
    external: true
  default:
    name: sztauer-${PROJECT_NAME}-internal
