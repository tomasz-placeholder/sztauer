<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sztauer</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        html, body { height: 100%; overflow: hidden; }
        .split {
            display: grid;
            grid-template-columns: 1fr 1fr;
            height: 100vh;
        }
        iframe {
            width: 100%;
            height: 100%;
            border: none;
        }
    </style>
</head>
<body>
    <div class="split">
        <iframe src="/sztauer/editor/" title="VS Code"></iframe>
        <iframe src="/sztauer/terminal/" title="Claude Code"></iframe>
    </div>
</body>
</html>
